<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}} — Rajesh RC</title>
<meta name="description" content="{{SUMMARY}}" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/blog/style.css" />
</head>
<body>
<div class="grid-bg" aria-hidden="true"></div>

<header class="top">
  <div class="wrap top-inner">
    <a class="brand" href="/">rajesh<span class="dim">@</span>rc<span class="dim"> ~ principal engineer</span></a>
    <nav class="links">
      <a href="/#work">work</a>
      <a href="/#patents">patents</a>
      <a href="/blog/">writing</a>
      <a href="/#contact">contact</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <article class="post">
    <a class="back" href="/blog/">← all writing</a>
    <header class="post-head">
      <div class="post-meta">{{DATE}}</div>
      <h1 class="post-title">{{TITLE}}</h1>
      <p class="post-summary">{{SUMMARY}}</p>
    </header>
    <div class="post-body">
      {{BODY}}
    </div>
  </article>
</main>

<footer class="foot">
  <div class="wrap foot-base">
    <span>Rajesh RC · Sunnyvale, CA</span>
    <span><a href="/">← back to portfolio</a></span>
  </div>
</footer>
</body>
</html>
